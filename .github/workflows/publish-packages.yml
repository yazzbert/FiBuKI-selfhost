name: Publish Packages (npm + ClawHub)

# Triggers:
#   1. Push to main with changes in cli/ or integrations/openclaw-plugin/
#      → auto-publishes the changed package(s)
#   2. GitHub Release with tag convention
#      → cli@0.1.0 / openclaw@0.1.0 / packages@0.1.0
#   3. Manual dispatch via Actions UI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "integrations/openclaw-plugin/**"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_cli:
        description: "Publish @fibukiapp/cli to npm"
        type: boolean
        default: false
      publish_openclaw:
        description: "Publish @fibukiapp/openclaw-plugin to npm + ClawHub"
        type: boolean
        default: false

permissions:
  id-token: write  # Required for npm trusted publishing (OIDC)
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # Detect which packages changed (for push trigger)
  # ──────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      cli_changed: ${{ steps.changes.outputs.cli }}
      openclaw_changed: ${{ steps.changes.outputs.openclaw }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed paths
        id: changes
        run: |
          # Compare with previous commit
          CLI_CHANGED=$(git diff --name-only HEAD~1 HEAD -- cli/ | wc -l | tr -d ' ')
          OPENCLAW_CHANGED=$(git diff --name-only HEAD~1 HEAD -- integrations/openclaw-plugin/ | wc -l | tr -d ' ')

          echo "cli=$( [ "$CLI_CHANGED" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "openclaw=$( [ "$OPENCLAW_CHANGED" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

          echo "CLI files changed: $CLI_CHANGED"
          echo "OpenClaw files changed: $OPENCLAW_CHANGED"

  # ──────────────────────────────────────────────────────────────
  # @fibukiapp/cli → npm
  # ──────────────────────────────────────────────────────────────
  publish-cli:
    name: "@fibukiapp/cli → npm"
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: >-
      always() && (
        (github.event_name == 'push' && needs.detect-changes.outputs.cli_changed == 'true')
        || (github.event_name == 'release' &&
            (startsWith(github.event.release.tag_name, 'cli@') ||
             startsWith(github.event.release.tag_name, 'packages@')))
        || (github.event_name == 'workflow_dispatch' && inputs.publish_cli)
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#*@}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Set version in package.json
        if: env.VERSION
        working-directory: cli
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Ensure version is publishable
        if: github.event_name != 'release'
        working-directory: cli
        run: |
          while true; do
            CURRENT=$(node -p "require('./package.json').version")
            if npm view "@fibukiapp/cli@${CURRENT}" version 2>/dev/null; then
              echo "Version ${CURRENT} exists, bumping patch..."
              npm version patch --no-git-tag-version
            else
              echo "Will publish version ${CURRENT}"
              break
            fi
          done

      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # @fibukiapp/openclaw-plugin → npm + ClawHub
  # ──────────────────────────────────────────────────────────────
  publish-openclaw:
    name: "@fibukiapp/openclaw-plugin → npm + ClawHub"
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: >-
      always() && (
        (github.event_name == 'push' && needs.detect-changes.outputs.openclaw_changed == 'true')
        || (github.event_name == 'release' &&
            (startsWith(github.event.release.tag_name, 'openclaw@') ||
             startsWith(github.event.release.tag_name, 'packages@')))
        || (github.event_name == 'workflow_dispatch' && inputs.publish_openclaw)
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#*@}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Set version in package.json
        if: env.VERSION
        working-directory: integrations/openclaw-plugin
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Ensure version is publishable
        if: github.event_name != 'release'
        working-directory: integrations/openclaw-plugin
        run: |
          while true; do
            CURRENT=$(node -p "require('./package.json').version")
            if npm view "@fibukiapp/openclaw-plugin@${CURRENT}" version 2>/dev/null; then
              echo "Version ${CURRENT} exists, bumping patch..."
              npm version patch --no-git-tag-version
            else
              echo "Will publish version ${CURRENT}"
              break
            fi
          done

      # ── npm publish ──
      - name: Publish to npm
        working-directory: integrations/openclaw-plugin
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── ClawHub publish ──
      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Authenticate to ClawHub
        run: clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish skill to ClawHub
        continue-on-error: true
        working-directory: integrations/openclaw-plugin/skills/fibuki-guide
        run: |
          VERSION="${VERSION:-$(node -p "require('../../package.json').version")}"
          REGISTRY="$(clawhub config get registry 2>/dev/null || echo https://clawhub.com)"

          # Build multipart form with acceptLicenseTerms in payload
          node -e "
          const fs = require('fs');
          const path = require('path');

          const payload = JSON.stringify({
            slug: 'fibuki',
            displayName: 'Bank Transactions Connector - Europe (PSD2)',
            version: '${VERSION}',
            changelog: process.env.CHANGELOG || 'Auto-publish from main',
            tags: ['latest'],
            acceptLicenseTerms: true,
          });

          // Collect all text files in current dir
          const files = [];
          function walk(dir, rel) {
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              if (e.isDirectory()) walk(path.join(dir, e.name), rel ? rel + '/' + e.name : e.name);
              else files.push({ abs: path.join(dir, e.name), rel: rel ? rel + '/' + e.name : e.name });
            }
          }
          walk('.', '');

          const form = new FormData();
          form.set('payload', payload);
          for (const f of files) {
            const buf = fs.readFileSync(f.abs);
            form.append('files', new Blob([buf], { type: 'text/plain' }), f.rel);
          }

          fetch('${REGISTRY}/api/v1/skills', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + process.env.CLAWHUB_TOKEN },
            body: form,
          }).then(async r => {
            const body = await r.text();
            if (!r.ok) { console.error('ClawHub error:', r.status, body); process.exit(1); }
            console.log('Published:', body);
          }).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CHANGELOG: ${{ github.event.release.body || 'Auto-publish from main' }}
