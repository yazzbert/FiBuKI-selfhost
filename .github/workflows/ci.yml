name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  functions:
    name: Cloud Functions (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  functions-selfhost:
    name: Self-host suite (PGlite + in-memory storage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run test:selfhost

  functions-selfhost-compose:
    name: Self-host suite (real Postgres + real S3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Start Postgres + MinIO (compose)
        run: docker compose -f deploy/selfhost/docker-compose.ci.yml up -d --wait
      - run: npm ci
        working-directory: functions
      # Same suite as functions-selfhost, pointed at the compose services.
      # Sequential (--no-file-parallelism): every worker would share the one
      # Postgres `docs` table, unlike the per-process PGlite default.
      - run: npm run test:selfhost -- --no-file-parallelism
        working-directory: functions
        env:
          DATABASE_URL: postgres://fibuki:fibuki-ci@localhost:5433/fibuki_ci
          FIBUKI_STORAGE: s3
          FIBUKI_S3_ENDPOINT: localhost
          FIBUKI_S3_PORT: "9000"
          FIBUKI_S3_SSL: "false"
          FIBUKI_S3_ACCESS_KEY: fibuki-ci
          FIBUKI_S3_SECRET_KEY: fibuki-ci-secret
          FIBUKI_STORAGE_BUCKET: fibuki-ci
      - name: Compose logs on failure
        if: failure()
        run: docker compose -f deploy/selfhost/docker-compose.ci.yml logs

  extension:
    name: Extension (jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/taxstudio-browser
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/taxstudio-browser/package-lock.json
      - run: npm ci
      - run: npm test

  firestore-parity:
    name: Firestore parity (firebase-admin vs shim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci
        working-directory: functions
      # emulators:exec exports FIRESTORE_EMULATOR_HOST, which un-skips the
      # firebase-admin half of the parity suite; the shim half always runs.
      - name: Run parity suite against the Firestore emulator
        run: >
          npx -y firebase-tools@14 emulators:exec --only firestore --project demo-fibuki
          "cd functions && npx vitest run src/test/firestore-parity.test.ts"
