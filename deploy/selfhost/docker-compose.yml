# FiBuKI self-host stack (work item 7). Runs the ported backend (fibuki-api,
# the selfhost host over the Firestore/storage/trigger/cron shims) + the Next
# frontend (fibuki-web, FIBUKI_BACKEND=selfhost alias build) against a real
# Postgres (Firestore-shim JSONB store) and MinIO (storage-shim S3 backend).
#
# Values come from ./.env (copy .env.example). Data lives in named volumes
# (fibuki-pgdata / fibuki-miniodata) — container-uid owned.
#
# Build + run:  docker compose --env-file .env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - fibuki-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${FIBUKI_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${FIBUKI_S3_SECRET_KEY}
    volumes:
      - fibuki-miniodata:/data
    # The storage shim (blobstore-s3.ts) creates the bucket on first use and
    # retries transient outages, so a hard healthcheck gate isn't required; a
    # readiness probe is still useful for `docker compose ps`.
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  fibuki-api:
    build:
      context: ../..
      dockerfile: deploy/selfhost/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: "8788"
      # Firestore-shim -> real Postgres (firestore-shim.ts DATABASE_URL branch)
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # storage-shim -> MinIO (blobstore-s3.ts)
      FIBUKI_STORAGE: s3
      FIBUKI_S3_ENDPOINT: minio
      FIBUKI_S3_PORT: "9000"
      FIBUKI_S3_SSL: "false"
      FIBUKI_S3_ACCESS_KEY: ${FIBUKI_S3_ACCESS_KEY}
      FIBUKI_S3_SECRET_KEY: ${FIBUKI_S3_SECRET_KEY}
      FIBUKI_STORAGE_BUCKET: ${FIBUKI_STORAGE_BUCKET}
      # download-URL base (buildDownloadUrl-shim.ts) + CORS allowlist (host.ts)
      FIBUKI_PUBLIC_URL: ${FIBUKI_PUBLIC_URL}
      FIBUKI_WEB_ORIGIN: ${FIBUKI_WEB_ORIGIN}
      # Authentik OIDC host verifier (oidc-verifier.ts). NO FIBUKI_DEV_UID in prod.
      # OIDC_JWKS_URI lets the verifier fetch keys from a directly-reachable URL
      # (e.g. the IdP on the same network) while OIDC_ISSUER stays the public,
      # browser-facing issuer that tokens are minted with. Leave blank to discover.
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP}
      # mailer-shim (Migadu SMTP; From pinned to FIBUKI_SMTP_USER)
      FIBUKI_SMTP_HOST: ${FIBUKI_SMTP_HOST}
      FIBUKI_SMTP_PORT: ${FIBUKI_SMTP_PORT}
      FIBUKI_SMTP_SECURE: ${FIBUKI_SMTP_SECURE}
      FIBUKI_SMTP_USER: ${FIBUKI_SMTP_USER}
      FIBUKI_SMTP_PASS: ${FIBUKI_SMTP_PASS}
      FIBUKI_SMTP_FROM_NAME: ${FIBUKI_SMTP_FROM_NAME}
    ports:
      - "8788:8788"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8788/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  fibuki-web:
    build:
      context: ../..
      dockerfile: deploy/selfhost/web.Dockerfile
      args:
        # NEXT_PUBLIC_* must be present at BUILD time — Next inlines them into
        # the client bundle and next.config extends the CSP from them.
        NEXT_PUBLIC_FIBUKI_API_URL: ${NEXT_PUBLIC_FIBUKI_API_URL}
        NEXT_PUBLIC_OIDC_ISSUER: ${NEXT_PUBLIC_OIDC_ISSUER}
        NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID}
        NEXT_PUBLIC_OIDC_SCOPE: ${NEXT_PUBLIC_OIDC_SCOPE}
        NEXT_PUBLIC_OIDC_ADMIN_GROUP: ${NEXT_PUBLIC_OIDC_ADMIN_GROUP}
        NEXT_PUBLIC_OIDC_REDIRECT_URI: ${NEXT_PUBLIC_OIDC_REDIRECT_URI}
        NEXT_PUBLIC_FIBUKI_POLL_MS: ${NEXT_PUBLIC_FIBUKI_POLL_MS}
    restart: unless-stopped
    depends_on:
      fibuki-api:
        condition: service_started
    environment:
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  fibuki-pgdata:
  fibuki-miniodata:
